fileVersion: 1
id: 08532194-c2ba-49e5-ab3e-c970be3fc5e8
isDisabled: false
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |
    capitalized: Copy of Stage
    short: STG
    plural: Stages
    tagColor: '#2EB67D'

    config:
    - groupName: Options
      items:
      - type: materializationSelector
        default: table
        options:
        - table
        - view
        isRequired: true

      - type: multisourceToggle
        enableIf: "{% if node.materializationType == 'table' %} true {% else %} false {% endif %}" 

      - type: overrideSQLToggle
        enableIf: "{% if node.materializationType == 'view' %} true {% else %} false {% endif %}"
        
      - displayName: Multi Source Strategy
        attributeName: insertStrategy
        type: dropdownSelector
        default: INSERT
        options:
        - "INSERT"
        - "UNION"
        - "UNION ALL"
        isRequired: true
        enableIf: "{% if node.isMultisource %} true {% else %} false {% endif %}"

      - displayName: Truncate Before
        attributeName: truncateBefore
        type: toggleButton
        default: true

      - displayName: Enable Tests
        attributeName: testsEnabled
        type: toggleButton
        default: true
        
      - displayName: Pre-SQL
        attributeName: preSQL
        type: textBox
        syntax: sql
        isRequired: false

      - displayName: Post-SQL
        attributeName: postSQL
        type: textBox
        syntax: sql
        isRequired: false
        
    systemColumns:
    - displayName: FOO
      attributeName: isSurrogateKey
      transform: "my sql transform"
      dataType: STRING
      placement: beginning
      nullable: true
      defaultValue: hello
      description: Some description
      enableIf: 'true'

    - displayName: BAR
      attributeName: isSurrogateKey
      transform: "my sql transform"
      dataType: STRING
      placement: beginning
      nullable: true
      defaultValue: hello
      description: Some description
      enableIf: 'true'
name: System Column Test Type
type: NodeType
